<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Doya Labs apps, support, and privacy information">
  <title>Doya Labs</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f5f7fa; color: #172033; }
    main { max-width: 720px; margin: 0 auto; padding: 72px 24px; }
    section { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 12px 36px rgba(24, 42, 77, .08); }
    h1 { margin: 0 0 12px; font-size: 40px; }
    p { line-height: 1.65; color: #596579; }
    nav { display: grid; gap: 14px; margin-top: 32px; }
    a { display: block; padding: 18px 20px; border-radius: 12px; background: #edf5ff; color: #087ff5; font-weight: 700; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body { background: #111318; color: #f4f5f7; }
      section { background: #1c1f26; }
      p { color: #b7bfcc; }
      a { background: #172b42; color: #64b0ff; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Doya Labs</h1>
      <p>작고 즐거운 아이디어를 앱으로 만듭니다.</p>
      <nav>
        <a href="photo-tile/">Photo Tile</a>
      </nav>
    </section>
  </main>
</body>
</html>
